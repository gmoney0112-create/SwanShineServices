<svg viewBox="0 0 1500 788" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1500" height="788" fill="url(#bgGradient)"/>
  
  <!-- Water effect -->
  <ellipse cx="750" cy="600" rx="600" ry="200" fill="rgba(100,180,220,0.2)"/>
  
  <!-- Swan Shine Logo and Text -->
  <text x="400" y="180" font-family="Cormorant Garamond, serif" font-size="140" font-weight="300" fill="#0a1628" letter-spacing="8">
    SWAN SHINE
  </text>
  
  <!-- Gold underline -->
  <line x1="100" y1="220" x2="700" y2="220" stroke="#c9a84c" stroke-width="3"/>
  
  <!-- Tagline -->
  <text x="100" y="280" font-family="DM Sans, sans-serif" font-size="48" font-weight="500" fill="#c9a84c" letter-spacing="4">
    CLEANING SERVICES
  </text>
  
  <!-- Service tags -->
  <g>
    <!-- Home icon -->
    <text x="100" y="360" font-size="36">🏠</text>
    <text x="170" y="370" font-family="DM Sans, sans-serif" font-size="32" font-weight="500" fill="#0a1628">RESIDENTIAL</text>
    
    <!-- Building icon -->
    <text x="580" y="360" font-size="36">🏢</text>
    <text x="650" y="370" font-family="DM Sans, sans-serif" font-size="32" font-weight="500" fill="#0a1628">COMMERCIAL</text>
    
    <!-- Sparkle icon -->
    <text x="1100" y="360" font-size="36">✨</text>
    <text x="1170" y="370" font-family="DM Sans, sans-serif" font-size="32" font-weight="500" fill="#0a1628">SPOTLESS RESULTS</text>
  </g>
  
  <!-- Swan illustration (simplified) -->
  <g transform="translate(1100, 280)">
    <!-- Swan neck -->
    <path d="M 0 0 Q 20 -80 40 -120" stroke="#0a1628" stroke-width="25" fill="none" stroke-linecap="round"/>
    <!-- Swan head -->
    <circle cx="50" cy="-140" r="20" fill="#0a1628"/>
    <!-- Swan beak -->
    <ellipse cx="65" cy="-138" rx="12" ry="6" fill="#e8621e"/>
    <!-- Swan body -->
    <ellipse cx="-20" cy="40" rx="50" ry="70" fill="#ffffff" stroke="#0a1628" stroke-width="2"/>
    <!-- Swan wing curve -->
    <path d="M -30 20 Q -60 30 -50 70" stroke="#0a1628" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Bottom tagline -->
  <rect x="0" y="680" width="1500" height="108" fill="#0a1628"/>
  <text x="750" y="750" font-family="DM Sans, sans-serif" font-size="56" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="2">
    CLEAN SPACES. HAPPY PLACES.
  </text>
  <text x="1330" y="750" font-size="48" fill="#c9a84c">✨</text>
</svg>